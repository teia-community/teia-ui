<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA routing: store the intended URL, then redirect to the app root.
      // The app root is detected from the URL — PR previews live at /owner/previews/pr-N/.
      var base =
        (window.location.pathname.match(/^(\/[^/]+\/previews\/pr-\d+\/)/) ||
          [])[1] || '/'
      // Only redirect if we're not already at the base — prevents an infinite
      // redirect loop when the deployment itself hasn't finished yet.
      if (window.location.pathname !== base) {
        sessionStorage.setItem(
          'spa-404-redirect',
          window.location.pathname + window.location.search + window.location.hash
        )
        window.location.replace(window.location.origin + base)
      }
    </script>
  </head>
</html>
